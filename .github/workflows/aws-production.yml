name: Build and Deploy to Fargate Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  run_application_tests:
    uses: ./.github/workflows/application-tests.yml
    secrets: inherit

  build_and_push_server:
    uses: ./.github/workflows/deployment-production.yml
    needs: run_application_tests
    secrets: inherit

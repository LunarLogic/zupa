  "/api/v1/library/book_packages":
    get:
      summary: list book packages
      tags:
      - Library Book Packages
      parameters:
      - name: status
        in: query
        required: false
        description: filter by status
        schema:
          type: string
      responses:
        '200':
          description: filtered by status
          content:
            application/json:
              example:
              - id: 116
                status: delivered
                note:
                packed_at: '2026-05-16T12:09:53.680Z'
                delivered_at: '2026-05-17T11:09:53.680Z'
                delivered_by: Alexander Bell
                created_at: '2026-05-17T12:09:53.681Z'
                updated_at: '2026-05-17T12:09:53.681Z'
                receiver:
                  id: 728
                  first_name: Anna
                  last_name: Kowalska
                  code: '114'
                  location_id: 868
                  book_preferences:
                location:
                  id: 868
                  name: Planty 1
                  region_name: Bieżanów
                  latitude: '9.99'
                  longitude: '9.99'
                books: []
              - id: 115
                status: packing
                note:
                packed_at:
                delivered_at:
                delivered_by:
                created_at: '2026-05-17T12:09:53.679Z'
                updated_at: '2026-05-17T12:09:53.679Z'
                receiver:
                  id: 728
                  first_name: Anna
                  last_name: Kowalska
                  code: '114'
                  location_id: 868
                  book_preferences:
                location:
                  id: 868
                  name: Planty 1
                  region_name: Bieżanów
                  latitude: '9.99'
                  longitude: '9.99'
                books: []
    post:
      summary: create book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: one book_id does not exist (atomic rollback)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    receiver_id:
                      type: integer
                    note:
                      type: string
                    book_ids:
                      type: array
                      items:
                        type: integer
                  required:
                  - receiver_id
  "/api/v1/library/book_packages/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: show book package
      tags:
      - Library Book Packages
      responses:
        '200':
          description: successful
        '404':
          description: not found
    patch:
      summary: update book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '200':
          description: status flipped to delivered
        '422':
          description: missing delivered_by when delivered
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    status:
                      type: string
                    note:
                      type: string
                    delivered_by:
                      type: string
    delete:
      summary: delete book package
      tags:
      - Library Book Packages
      responses:
        '204':
          description: deleted
  "/api/v1/library/book_packages/{id}/items":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: add a book to the package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '201':
          description: added
        '422':
          description: book_id does not exist
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_id:
                  type: integer
              required:
              - book_id
  "/api/v1/library/book_packages/{id}/items/{book_id}":

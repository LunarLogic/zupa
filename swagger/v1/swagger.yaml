  "/api/v1/library/book_packages":
    get:
      summary: list book packages
      tags:
      - Library Book Packages
      parameters:
      - name: status
        in: query
        required: false
        description: filter by status
        schema:
          type: string
      responses:
        '200':
          description: filtered by status
          content:
            application/json:
              example:
              - id: 304
                status: delivered
                note:
                packed_at: '2026-05-16T13:11:44.385Z'
                delivered_at: '2026-05-17T12:11:44.385Z'
                delivered_by: Alexander Bell
                created_at: '2026-05-17T13:11:44.386Z'
                updated_at: '2026-05-17T13:11:44.386Z'
                receiver:
                  id: 923
                  first_name: Anna
                  last_name: Kowalska
                  code: '114'
                  location_id: 1086
                  book_preferences:
                location:
                  id: 1086
                  name: Planty 1
                  region_name: Bieżanów
                  latitude: '9.99'
                  longitude: '9.99'
                books: []
              - id: 303
                status: packing
                note:
                packed_at:
                delivered_at:
                delivered_by:
                created_at: '2026-05-17T13:11:44.381Z'
                updated_at: '2026-05-17T13:11:44.381Z'
                receiver:
                  id: 923
                  first_name: Anna
                  last_name: Kowalska
                  code: '114'
                  location_id: 1086
                  book_preferences:
                location:
                  id: 1086
                  name: Planty 1
                  region_name: Bieżanów
                  latitude: '9.99'
                  longitude: '9.99'
                books: []
    post:
      summary: create book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: one book is borrowed (atomic rollback)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    receiver_id:
                      type: integer
                    note:
                      type: string
                    book_ids:
                      type: array
                      items:
                        type: integer
                  required:
                  - receiver_id
  "/api/v1/library/book_packages/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: show book package
      tags:
      - Library Book Packages
      responses:
        '200':
          description: successful
        '404':
          description: not found
    patch:
      summary: update book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '200':
          description: delivering marks child books as borrowed
        '422':
          description: missing delivered_by when delivered
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    status:
                      type: string
                    note:
                      type: string
                    delivered_by:
                      type: string
    delete:
      summary: delete book package
      tags:
      - Library Book Packages
      responses:
        '204':
          description: deleted
  "/api/v1/library/book_packages/{id}/items":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: add a book to the package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '201':
          description: added
        '422':
          description: book_id does not exist
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_id:
                  type: integer
              required:
              - book_id
  "/api/v1/library/book_packages/{id}/items/{book_id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    - name: book_id
      in: path
      required: true
      schema:
        type: string
    delete:
      summary: remove a book from the package
      tags:
      - Library Book Packages
      responses:
        '204':
          description: removing item from delivered package keeps book borrowed
  "/api/v1/library/books":
    get:
      summary: list books
      tags:
      - Library Books
      parameters:
      - name: q
        in: query
        required: false
        description: search by title/author (ILIKE)
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: filter by status
        schema:
          type: string
      - name: genre
        in: query
        required: false
        description: filter by genre (single)
        schema:
          type: string
      responses:
        '200':
          description: filtered by genre
          content:
            application/json:
              example:
              - id: 434
                title: Hobbit
                author: Tolkien
                isbn: '9788300000024'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - fantasy
                status: available
                cover_photo_url:
                created_at: '2026-05-17T13:11:45.278Z'
                updated_at: '2026-05-17T13:11:45.278Z'

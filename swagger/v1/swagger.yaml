  "/api/v1/library/books":
    get:
      summary: list books
      tags:
      - Library Books
      parameters:
      - name: q
        in: query
        required: false
        description: search by title/author (ILIKE)
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: filter by status
        schema:
          type: string
      - name: genre
        in: query
        required: false
        description: filter by genre (single)
        schema:
          type: string
      responses:
        '200':
          description: filtered by genre
          content:
            application/json:
              example:
              - id: 176
                title: Hobbit
                author: Tolkien
                isbn: '9788300000006'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - fantasy
                status: available
                cover_photo_url:
                created_at: '2026-05-16T14:51:33.506Z'
                updated_at: '2026-05-16T14:51:33.506Z'
              - id: 175
                title: Old Tome
                author: Ancient
                isbn: '9788300000005'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - fantasy
                status: archived
                cover_photo_url:
                created_at: '2026-05-16T14:51:33.504Z'
                updated_at: '2026-05-16T14:51:33.504Z'
              - id: 174
                title: Lalka
                author: Bolesław Prus
                isbn: '9788300000004'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - literatura_piekna
                status: available
                cover_photo_url:
                created_at: '2026-05-16T14:51:33.502Z'
                updated_at: '2026-05-16T14:51:33.502Z'
    post:
      summary: create book
      tags:
      - Library Books
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book:
                  type: object
                  properties:
                    title:
                      type: string
                    author:
                      type: string
                    isbn:
                      type: string
                    description:
                      type: string
                    length:
                      type: integer
                    publisher:
                      type: string
                    pub_year:
                      type: integer
                    extra_note:
                      type: string
                    status:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
                  required:
                  - title
                  - author
  "/api/v1/library/books/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: show book
      tags:
      - Library Books
      responses:
        '200':
          description: successful
        '404':
          description: not found
    patch:
      summary: update book
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book:
                  type: object
                  properties:
                    title:
                      type: string
                    extra_note:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
    delete:
      summary: delete book
      tags:
      - Library Books
      responses:
        '204':
          description: deleted
  "/api/v1/library/books/{id}/qr_code":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: bind QR code to book
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: bound
        '409':
          description: conflict — QR already bound to another book
        '422':
          description: missing qr_code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_code:
                  type: string
              required:
              - qr_code
  "/api/v1/library/books/{id}/photo":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: attach cover photo
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: attached
        '422':
          description: missing photo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
  "/api/v1/library/isbn_lookup":
    get:
      summary: lookup book metadata by ISBN
      tags:
      - Library Books
      parameters:
      - name: isbn
        in: query
        required: true
        description: ISBN-10 or ISBN-13 (hyphens and spaces stripped server-side)
        schema:
          type: string
      responses:
        '200':
          description: found
          content:
            application/json:
              example:
                isbn: '9780140449266'
                title: The Count of Monte Cristo
                author: Alexandre Dumas
                length: 1276
                publisher: Penguin Books
                pub_year: 2003
                cover_url: https://covers.openlibrary.org/b/id/14564134-L.jpg
        '404':
          description: not found
        '422':
          description: missing isbn

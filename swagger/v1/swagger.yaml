      schema:
        type: string
    post:
      summary: bind QR code to book
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: bound
        '409':
          description: conflict — QR already bound to another book
        '422':
          description: missing qr_code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_code:
                  type: string
              required:

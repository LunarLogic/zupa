                status: available
                cover_photo_url:
                created_at: '2026-05-16T14:15:02.061Z'
                updated_at: '2026-05-16T14:15:02.061Z'
    post:
      summary: create book
      tags:
      - Library Books
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book:
                  type: object
                  properties:
                    title:
                      type: string
                    author:
                      type: string
                    isbn:
                      type: string
                    description:
                      type: string
                    length:
                      type: integer
                    publisher:
                      type: string
                    pub_year:
                      type: integer
                    extra_note:
                      type: string
                    status:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
                  required:
                  - title
                  - author
  "/api/v1/library/books/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: show book
      tags:
      - Library Books
      responses:
        '200':
          description: successful
        '404':
          description: not found
    patch:
      summary: update book
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book:
                  type: object
                  properties:
                    title:
                      type: string
                    extra_note:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
    delete:
      summary: delete book
      tags:
      - Library Books
      responses:
        '204':
          description: deleted
  "/api/v1/library/books/{id}/qr_code":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: bind QR code to book
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: bound
        '409':
          description: conflict — QR already bound to another book
        '422':
          description: missing qr_code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_code:
                  type: string
              required:
              - qr_code
  "/api/v1/library/books/{id}/photo":
    parameters:

      required: true
      schema:
        type: string
    post:
      summary: attach cover photo
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: attached
        '422':
          description: missing photo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
  "/api/v1/library/isbn_lookup":
    get:
      summary: lookup book metadata by ISBN
      tags:
      - Library Books
      parameters:
      - name: isbn
        in: query
        required: true
        description: ISBN-10 or ISBN-13 (hyphens and spaces stripped server-side)
        schema:
          type: string
      responses:
        '200':
          description: found
          content:
            application/json:
              example:
                isbn: '9780140449266'
                title: The Count of Monte Cristo
                author: Alexandre Dumas
                length: 1276
                publisher: Penguin Books
                pub_year: 2003
                cover_url: https://covers.openlibrary.org/b/id/14564134-L.jpg
        '404':
          description: not found
        '422':
          description: invalid isbn format

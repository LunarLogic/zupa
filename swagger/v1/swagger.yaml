                author: Ancient
                isbn: '9788300000016'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - fantasy
                status: archived
                cover_photo_url:
                created_at: '2026-05-17T12:09:54.344Z'
                updated_at: '2026-05-17T12:09:54.344Z'
              - id: 279
                title: Lalka
                author: Bolesław Prus
                isbn: '9788300000015'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - literatura_piekna
                status: available
                cover_photo_url:
                created_at: '2026-05-17T12:09:54.343Z'
                updated_at: '2026-05-17T12:09:54.343Z'
    post:
      summary: create book
      tags:
      - Library Books
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book:
                  type: object
                  properties:
                    title:
                      type: string
                    author:
                      type: string
                    isbn:
                      type: string
                    description:
                      type: string
                    length:
                      type: integer
                    publisher:
                      type: string
                    pub_year:
                      type: integer
                    extra_note:
                      type: string
                    status:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
                  required:
                  - title
                  - author
  "/api/v1/library/books/{id}":
    parameters:

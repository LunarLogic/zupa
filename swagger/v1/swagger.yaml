  "/api/v1/library/books":
    get:
      summary: list books
      tags:
      - Library Books
      parameters:
      - name: q
        in: query
        required: false
        description: search by title/author (ILIKE)
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: filter by status
        schema:
          type: string
      - name: genre
        in: query
        required: false
        description: filter by genre (single)
        schema:
          type: string
      responses:
        '200':
          description: filtered by genre
          content:
            application/json:
              example:
              - id: 31
                title: Hobbit
                author: Tolkien
                isbn: '9788300000006'

                  first_name: Anna
                  last_name: Kowalska
                  code: '114'
                  location_id: 776
                  book_preferences:
                location:
                  id: 776
                  name: Planty 1
                  region_name: Bieżanów
                  latitude: '9.99'
                  longitude: '9.99'
                books: []
              - id: 83
                status: packing
                note:
                packed_at:
                delivered_at:
                delivered_by:
                created_at: '2026-05-17T10:35:35.625Z'
                updated_at: '2026-05-17T10:35:35.625Z'
                receiver:
                  id: 651
                  first_name: Anna
                  last_name: Kowalska
                  code: '114'
                  location_id: 776
                  book_preferences:
                location:
                  id: 776
                  name: Planty 1
                  region_name: Bieżanów
                  latitude: '9.99'
                  longitude: '9.99'
                books: []
    post:
      summary: create book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    receiver_id:
                      type: integer
                    note:
                      type: string
                    book_ids:
                      type: array
                      items:
                        type: integer
                  required:
                  - receiver_id
  "/api/v1/library/book_packages/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: show book package
      tags:
      - Library Book Packages
      responses:
        '200':
          description: successful
        '404':
          description: not found
    patch:
      summary: update book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '200':
          description: status flipped to delivered
        '422':
          description: missing delivered_by when delivered
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    status:
                      type: string
                    note:
                      type: string
                    delivered_by:
                      type: string
    delete:
      summary: delete book package
      tags:
      - Library Book Packages
      responses:
        '204':
          description: deleted

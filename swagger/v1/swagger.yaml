  "/api/v1/library/books/{id}/qr_code":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: bind QR code to book
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: bound
        '409':
          description: conflict — QR already bound to another book
        '422':
          description: missing qr_code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_code:
                  type: string
              required:
              - qr_code
  "/api/v1/library/books/{id}/photo":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: attach cover photo
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: attached
        '422':
          description: missing photo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
  "/api/v1/library/books/by_qr_code":
    get:
      summary: look up book by QR code
      tags:
      - Library Books
      parameters:
      - name: qr
        in: query
        required: true
        description: exact QR sticker code bound to a book
        schema:
          type: string
      responses:
        '200':
          description: found
          content:
            application/json:
              example:
                id: 302
                title: Test Book 5
                author: Author 13
                isbn: '9788300000037'

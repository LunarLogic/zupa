      required: true
      schema:
        type: string
    post:
      summary: attach cover photo
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: attached
        '422':
          description: missing photo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true

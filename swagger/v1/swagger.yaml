  "/api/v1/library/books/{id}/photo":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: attach cover photo
      tags:
      - Library Books
      parameters: []
      responses:
        '200':
          description: attached
        '422':
          description: missing photo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
  "/api/v1/library/books/by_qr_code":
    get:
      summary: look up book by QR code

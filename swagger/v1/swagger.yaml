      summary: create book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    receiver_id:
                      type: integer
                    note:
                      type: string
                    book_ids:
                      type: array
                      items:
                        type: integer
                  required:
                  - receiver_id
  "/api/v1/library/book_packages/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: show book package
      tags:
      - Library Book Packages
      responses:
        '200':
          description: successful
        '404':
          description: not found
    patch:
      summary: update book package
      tags:
      - Library Book Packages
      parameters: []
      responses:
        '200':
          description: status flipped to delivered
        '422':
          description: missing delivered_by when delivered
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book_package:
                  type: object
                  properties:
                    status:
                      type: string
                    note:
                      type: string
                    delivered_by:
                      type: string
    delete:
      summary: delete book package
      tags:
      - Library Book Packages
      responses:
        '204':
          description: deleted

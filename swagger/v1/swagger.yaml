      tags:
      - Library Books
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book:
                  type: object
                  properties:
                    title:
                      type: string
                    author:
                      type: string
                    isbn:
                      type: string
                    description:
                      type: string
                    length:
                      type: integer
                    publisher:
                      type: string
                    pub_year:
                      type: integer
                    extra_note:
                      type: string
                    status:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
                  required:

                author: Ancient
                isbn: '9788300000023'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - fantasy
                status: archived
                cover_photo_url:
                created_at: '2026-05-17T13:11:45.277Z'
                updated_at: '2026-05-17T13:11:45.277Z'
              - id: 432
                title: Lalka
                author: Bolesław Prus
                isbn: '9788300000022'
                description:
                length:
                publisher:
                pub_year:
                qr_code:
                extra_note:
                genres:
                - literatura_piekna
                status: available
                cover_photo_url:
                created_at: '2026-05-17T13:11:45.275Z'
                updated_at: '2026-05-17T13:11:45.275Z'
    post:
      summary: create book
      tags:
      - Library Books
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                book:
                  type: object
                  properties:
                    title:
                      type: string
                    author:
                      type: string
                    isbn:
                      type: string
                    description:
                      type: string
                    length:
                      type: integer
                    publisher:
                      type: string
                    pub_year:
                      type: integer
                    extra_note:
                      type: string
                    status:
                      type: string
                    genres:
                      type: array
                      items:
                        type: string
                  required:
                  - title
                  - author
